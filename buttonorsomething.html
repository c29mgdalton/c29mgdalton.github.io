<!DOCTYPE html>
<html>
<head>
	<style type="text/css">
		
#unpressable{
position: absolute;
}

	</style>
</head>
<body>
<button id="unpressable">try it i dare you</button>

<script>
	let unpressable = document.getElementById("unpressable")
	console.log(unpressable)
unpressable.addEventListener("click", function(){
	console.log("mouse clicked ig")
})
	unpressable.addEventListener("mouseover", function(){
	console.log("mouse is over")
	unpressable.style.top = Math.random() * 600 + "px"
	unpressable.style.left = Math.random() * 600 + "px"
})
	unpressable.addEventListener("mouseout", function(){
	console.log("mouse is not over")
})
</script>
</body>

</html>
