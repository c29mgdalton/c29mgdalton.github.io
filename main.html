<!DOCTYPE html>
<html>
<head>
<style type="text/css">

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; 
}

.back {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-image: url('background.avif');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  z-index: 1; 
}

.mainbody1 {
  position: fixed;
  top: 0;
  left: 0;
  width: 950px;
  height: 797px;
  background: #222222;
  z-index: 2;
}

.mainbody2 {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100px;
  background: #222222;
  z-index: 2;
}

.mainbody3 {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100vw;
  height: 30px;
  background: #222222;
  z-index: 2;
}

/* Container to hold all the buttons and align them */
.nav-container {
  position: fixed;
  top: 20px;
  right: 50px;       /* Adjusted to give the row room to expand left */
  display: flex;
  gap: 20px;          /* This creates the exact equal distance between buttons */
  z-index: 3;         /* Lifted above mainbody2 */
}

/* Combined class for all navigation buttons to ensure identical sizing */
.nav-btn {
  background: #141414;
  outline: 2px solid #d3d3d3; 
  padding: 20px;
  border: none; 
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn img {
  display: block;
  width: 24px;  
  height: 24px;
}

</style>
</head>
<body>

<div class="back"></div>
<div class="mainbody1"></div>
<div class="mainbody2"></div>
<div class="mainbody3"></div>

<div class="nav-container">
  <a href="stats.html">
    <button class="nav-btn">
      <img src="stats.svg" alt="Stats">
    </button>
  </a>
  <a href="shop.html">
    <button class="nav-btn">
      <img src="shop.svg" alt="Shop">
    </button>
  </a>
  <a href="inventory.html">
    <button class="nav-btn">
      <img src="inventory.svg" alt="Inventory">
    </button>
  </a>
  <a href="ascend.html">
    <button class="nav-btn">
      <img src="ascend.svg" alt="Ascend">
    </button>
  </a>
  <a href="sword.html">
    <button class="nav-btn">
      <img src="sword.svg" alt="Sword">
    </button>
  </a>
</div>

</body>
</html>
