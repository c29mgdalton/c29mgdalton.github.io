<!DOCTYPE html>

<head>

</head>
<body>
<script>
function setup(){
createCanvas(400,400)
}

function draw() {

fill(255,255,0)

ellipse(160, 160, 200, 160)

fill("orange")
triangle(120, 170, 200, 170, 160, 330)

fill("black")
circle(120, 140, 25)
circle(200, 140, 25)

stroke("white")
circle(125, 137, 9)
circle(195, 137, 9)
circle(205, 144, 7)
circle(115, 144, 7)
}
